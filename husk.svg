<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00ffcc"/>
      <stop offset="1" stop-color="#8a2be2"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="51.5" fill="none"
        stroke="#3b4261" stroke-width="1"/>

  <!-- binary "husk" being inspected -->
  <g font-family="monospace" font-weight="bold" font-size="30"
     fill="#565f89" text-anchor="middle">
    <text x="108" y="92">0 1 1</text>
    <text x="92" y="128">1 0</text>
    <text x="84" y="164">0 1 1 0</text>
  </g>

  <!-- magnifying glass / lens highlighting one bit -->
  <g fill="none" stroke="url(#ring)" stroke-width="14" stroke-linecap="round">
    <circle cx="150" cy="120" r="52"/>
    <line x1="190" y1="160" x2="226" y2="196"/>
  </g>
  <circle cx="150" cy="120" r="40" fill="#00ffcc" fill-opacity="0.10"/>
  <text x="150" y="133" font-family="monospace" font-weight="bold"
        font-size="44" fill="#00ffcc" text-anchor="middle">1</text>
</svg>
